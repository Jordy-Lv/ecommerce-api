# Configuracion para desarrollo local
# Usa esta cuando estes trabajando en tu maquina sin Docker

spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=always

# JWT para pruebas locales (minimo 32 bytes / 256 bits para HMAC-SHA256)
jwt.secret=desarrollo-local-secreto-2026-con-clave-de-32-bytes
jwt.expiration=86400000
